# StrawCore AI 3B Final Manglish Specs
model_id: "Qwen/Qwen2.5-3B-Instruct"
dataset_path: "data/manglish_booking_data.jsonl"
output_dir: "checkpoints/manglish-qwen-3b"
max_seq_length: 256  # Reduced to ensure Swap stability

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: ["q_proj", "v_proj"]

learning_rate: 0.0001
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
optim: "adafactor"
logging_steps: 1
gradient_checkpointing: True
