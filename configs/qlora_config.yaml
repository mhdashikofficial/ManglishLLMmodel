model_id: "meta-llama/Meta-Llama-3-8B-Instruct"  # or mistralai/Mistral-7B-Instruct-v0.2
dataset_path: "../data/training_data.jsonl"
output_dir: "../checkpoints/manglish-llama-3-8b"
max_seq_length: 2048

# QLoRA configuration
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_use_double_quant: true

# LoRA configuration
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# Training parameters
learning_rate: 0.0002
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
optim: "paged_adamw_32bit"
lr_scheduler_type: "cosine"
max_grad_norm: 0.3
warmup_ratio: 0.03
save_steps: 100
logging_steps: 10
